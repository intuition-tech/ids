<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Intuition Design System Template</title>
    <link rel="icon" type="image/png" href="images/favicon-inverted.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      (function () {
        var theme = localStorage.getItem("ids-theme");
        if (
          theme === "dark" ||
          (!theme && matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <link rel="stylesheet" href="css/tokens/palette.css" />
    <link rel="stylesheet" href="css/tokens/colors.css" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/tokens/scales.css" />
    <link rel="stylesheet" href="css/settings.css" />
    <link rel="stylesheet" href="css/page-composition/layout.css" />
    <link rel="stylesheet" href="css/components/ids.css" />
    <link rel="stylesheet" href="css/components/gallery.css" />
    <link rel="stylesheet" href="css/components/navbar.css" />
    <link rel="stylesheet" href="css/components/theme-toggle.css" />
    <link rel="stylesheet" href="css/components/gen-cover.css" />
  </head>

  <body class="ids">
    <header>
      <a href="index.html">←IDS</a>
      <button
        class="ids__theme-toggle"
        role="switch"
        aria-checked="false"
        aria-label="Тёмная тема">
        <span class="ids__theme-toggle__track"
          ><span class="ids__theme-toggle__thumb"></span
        ></span>
      </button>
    </header>

    <main>
      <div class="ids__wrapper">
        <div class="ids__space L"></div>
        <div class="ids__text-width">
          <div class="ids__gen-cover-demo" data-gen-cover-demo>
            <div data-gen-cover-frames></div>
            <div class="ids__gen-cover-demo__toolbar">
              <div class="ids__gen-cover-demo__field">
                <span class="ids__gen-cover-demo__label">Palette</span>
                <div data-gen-cover-palette></div>
              </div>
              <button type="button" data-gen-cover-randomize-all>
                Randomize all
              </button>
              <label class="ids__gen-cover-demo__field">
                <input type="checkbox" data-gen-cover-grain checked />
                <span class="ids__gen-cover-demo__label">Grain</span>
              </label>
              <label class="ids__gen-cover-demo__field">
                <input type="checkbox" data-gen-cover-rounded checked />
                <span class="ids__gen-cover-demo__label">Rounded</span>
              </label>
            </div>
          </div>
        </div>

        <div class="ids__space S"></div>

        <div data-gen-cover-gallery>
          <ids-gen-cover
            class="ids__rounded"
            palette="prism"
            seed-a="27"
            seed-b="4">
          </ids-gen-cover>
        </div>

        <div class="ids__space XL"></div>
      </div>
    </main>

    <footer>© 2025</footer>

    <script src="./js/theme-toggle.js"></script>
    <script src="./js/gen-cover.js"></script>
    <script src="./js/gen-cover-demo.js"></script>
  </body>
</html>
